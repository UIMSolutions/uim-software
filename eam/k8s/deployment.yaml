apiVersion: apps/v1
kind: Deployment
metadata:
  name: eam
  namespace: uim-platform
  labels:
    app: eam
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eam
  template:
    metadata:
      labels:
        app: eam
    spec:
      containers:
      - name: eam
        image: uim-platform/eam:latest
        ports:
        - containerPort: 8120
          protocol: TCP
        envFrom:
        - configMapRef:
            name: eam-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8120
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8120
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
