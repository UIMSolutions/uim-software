apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtt
  namespace: uim-platform
  labels:
    app: gtt
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gtt
  template:
    metadata:
      labels:
        app: gtt
    spec:
      containers:
      - name: gtt
        image: uim-platform/gtt:latest
        ports:
        - containerPort: 8115
          protocol: TCP
        envFrom:
        - configMapRef:
            name: gtt-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8115
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8115
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
