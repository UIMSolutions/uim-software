apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-strategy-performance
  namespace: uim-platform
  labels:
    app: asset-strategy-performance
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asset-strategy-performance
  template:
    metadata:
      labels:
        app: asset-strategy-performance
    spec:
      containers:
      - name: asset-strategy-performance
        image: uim-platform/asset-strategy-performance:latest
        ports:
        - containerPort: 8105
          protocol: TCP
        envFrom:
        - configMapRef:
            name: asset-strategy-performance-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8105
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8105
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
