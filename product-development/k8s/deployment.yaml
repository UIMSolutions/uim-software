apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-development
  namespace: uim-platform
  labels:
    app: product-development
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-development
  template:
    metadata:
      labels:
        app: product-development
    spec:
      containers:
      - name: product-development
        image: uim-platform/product-development:latest
        ports:
        - containerPort: 8106
          protocol: TCP
        envFrom:
        - configMapRef:
            name: product-development-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8106
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8106
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
