apiVersion: apps/v1
kind: Deployment
metadata:
  name: sci
  namespace: uim-platform
  labels:
    app: sci
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sci
  template:
    metadata:
      labels:
        app: sci
    spec:
      containers:
      - name: sci
        image: uim-platform/sci:latest
        ports:
        - containerPort: 8110
          protocol: TCP
        envFrom:
        - configMapRef:
            name: sci-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8110
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8110
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
